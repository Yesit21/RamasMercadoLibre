<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MercadoLibre</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="anuncio">
        Envío gratis en miles de productos con Mercado Puntos
    </div>

    <header class="encabezado">
        <div class="logo">MercadoLibre</div>
        <div class="buscador">
            <input type="search" id="campoBusqueda" placeholder="Buscar productos, marcas y más">
            <button onclick="buscar()">Buscar</button>
        </div>
        <nav class="acciones">
            <a href="#">Ingresar</a>
            <a href="#">Crear cuenta</a>
            <a href="#">Mis compras</a>
            <a href="#">Carrito</a>
            <a href="#">Vender</a>
        </nav>
    </header>

    <nav class="nav">
        <ul>
            <li>Categorías</li>
            <li>Ofertas</li>
            <li>Supermercado</li>
            <li>Moda</li>
            <li>Electrónica</li>
        </ul>
    </nav>

    <section class="carrusel">
        <div class="slide">Promoción 1</div>
        <div class="slide">Promoción 2</div>
        <div class="slide">Promoción 3</div>
    </section>

    <section class="categorias">
        <h2>Categorías</h2>
        <div class="grilla-categorias">
            <div class="categoria">Tecnología</div>
            <div class="categoria">Moda</div>
            <div class="categoria">Hogar</div>
            <div class="categoria">Deportes</div>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
